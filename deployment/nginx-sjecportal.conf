##
# SJEC Publications Portal - Nginx Configuration
# Place this in: /etc/nginx/sites-available/sjecportal
##

server {
    listen 80;
    listen [::]:80;
    
    # Server names
    server_name publications.local publications 192.168.111.79;
    
    # Max upload size (for publication files, PDFs, etc.)
    client_max_body_size 50M;
    
    # Access and error logs
    access_log /var/log/nginx/sjecportal_access.log;
    error_log /var/log/nginx/sjecportal_error.log;
    
    # Serve static files directly
    location /static {
        alias /opt/sjec-publications/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Serve uploaded files
    location /uploads {
        alias /opt/sjec-publications/uploads;
        expires 7d;
    }
    
    # Proxy all other requests to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long-running requests
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
